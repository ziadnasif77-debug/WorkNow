name: CI — Full Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Job 1: Code Quality ───────────────────────────────────────────────────
  quality:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo build --filter=@workfix/types --filter=@workfix/utils --filter=@workfix/config

      - name: TypeScript check
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

  # ─── Job 2: Unit Tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo build --filter=@workfix/types --filter=@workfix/utils --filter=@workfix/config

      - name: Run unit tests (utils)
        run: pnpm --filter @workfix/utils test -- --coverage

      - name: Run unit tests (functions — no emulator)
        run: |
          cd functions
          pnpm test -- \
            --testPathPattern="unit/" \
            --coverage \
            --coverageThreshold='{"global":{"branches":55,"functions":65,"lines":65}}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: functions/coverage/

  # ─── Job 3: Security Rules Tests ─────────────────────────────────────────
  rules-tests:
    name: Firestore Security Rules
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Security Rules tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project workfix-test \
            'cd functions && pnpm test -- --testPathPattern=emulator'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ─── Job 4: Integration Tests ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, rules-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build functions
        run: pnpm turbo build --filter=@workfix/functions

      - name: Run integration tests
        run: |
          firebase emulators:exec \
            --only firestore,auth,functions,storage \
            --project workfix-test \
            'cd functions && pnpm test -- --testPathPattern=integration'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          TAP_SECRET_KEY:     ${{ secrets.TEST_TAP_SECRET_KEY }}

  # ─── Job 5: Security Audit ────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified
        continue-on-error: true

  # ─── Job 6: E2E Detox Tests (Android — push to main only) ───────────────────
  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo build --filter=@workfix/types --filter=@workfix/utils --filter=@workfix/config

      - name: Expo Prebuild (generate Android native code)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.DEV_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.DEV_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.DEV_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.DEV_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.DEV_FIREBASE_APP_ID }}
          EXPO_PUBLIC_ENV:                          development

      - name: Build Android debug APK
        working-directory: apps/mobile
        run: pnpm build:e2e

      - name: AVD Cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-33

      - name: Create AVD snapshot (if not cached)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Pixel 6
          avd-name: Pixel_6_API_33
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created"

      - name: Run Detox E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: Pixel 6
          avd-name: Pixel_6_API_33
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: apps/mobile
          script: pnpm test:e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: apps/mobile/artifacts/

  # ─── Job 7: Deploy to Staging (on merge to main) ──────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, rules-tests, integration-tests, e2e-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build functions
        run: pnpm turbo build --filter=@workfix/functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy Functions → dev
        run: firebase deploy --only functions --project dev
        env:
          FIREBASE_TOKEN:      ${{ secrets.FIREBASE_TOKEN }}
          TAP_SECRET_KEY:      ${{ secrets.DEV_TAP_SECRET_KEY }}
          TAP_WEBHOOK_SECRET:  ${{ secrets.DEV_TAP_WEBHOOK_SECRET }}

      - name: Deploy Rules + Indexes → dev
        run: firebase deploy --only firestore,storage --project dev
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: EAS Update (OTA preview)
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version:  latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas update --auto --channel preview
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.DEV_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.DEV_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.DEV_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.DEV_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.DEV_FIREBASE_APP_ID }}
          EXPO_PUBLIC_PROJECT_ID:                   ${{ secrets.DEV_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_ENV:                          development

  # ─── Job 7: Deploy to Production (on tag v*.*.*) ──────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, rules-tests, integration-tests, security-audit]
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: production
      url: https://workfix.app

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build functions
        run: pnpm turbo build --filter=@workfix/functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy Functions → prod
        run: firebase deploy --only functions --project prod
        env:
          FIREBASE_TOKEN:      ${{ secrets.FIREBASE_TOKEN }}
          TAP_SECRET_KEY:      ${{ secrets.PROD_TAP_SECRET_KEY }}
          TAP_WEBHOOK_SECRET:  ${{ secrets.PROD_TAP_WEBHOOK_SECRET }}

      - name: Deploy Rules + Indexes → prod
        run: firebase deploy --only firestore,storage --project prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: EAS Build + Submit (Production)
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version:  latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build iOS + Android
        run: eas build --platform all --profile production --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.PROD_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.PROD_FIREBASE_APP_ID }}
          EXPO_PUBLIC_PROJECT_ID:                   ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_SENTRY_DSN:                   ${{ secrets.SENTRY_DSN }}
          EXPO_PUBLIC_ENV:                          production

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

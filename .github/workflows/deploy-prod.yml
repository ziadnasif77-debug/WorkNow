name: Deploy → Production

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never cancel a production deploy

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://workfix.app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Functions
        run: pnpm turbo build --filter=@workfix/functions

      - name: Deploy Firebase
        run: firebase deploy --only functions,firestore,storage --project prod
        env:
          FIREBASE_TOKEN:     ${{ secrets.FIREBASE_TOKEN }}
          TAP_SECRET_KEY:     ${{ secrets.PROD_TAP_SECRET_KEY }}
          TAP_WEBHOOK_SECRET: ${{ secrets.PROD_TAP_WEBHOOK_SECRET }}

      - name: EAS OTA Update
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version:  latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas update --auto --channel production
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_ENV:                          production
          EXPO_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.PROD_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.PROD_FIREBASE_APP_ID }}
          EXPO_PUBLIC_SENTRY_DSN:                   ${{ secrets.SENTRY_DSN }}
          EXPO_PUBLIC_USE_EMULATOR:                 "false"

      - name: Notify success
        if: success()
        run: echo "✅ Production deployment complete for ${{ github.ref_name }}"

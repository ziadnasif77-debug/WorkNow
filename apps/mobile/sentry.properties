# Sentry configuration for WorkNow mobile app
# These values are safe to commit — they are project identifiers, NOT secrets.
# The actual DSN (which contains the secret key) stays in EXPO_PUBLIC_SENTRY_DSN
# and is never committed.
#
# To get your values:
#   1. Go to sentry.io → Settings → Projects → WorkNow
#   2. Copy the "Organization Slug" and "Project Slug"
#
defaults.url=https://sentry.io/
defaults.org=your-org-slug
defaults.project=workfix-mobile
# auth.token is read from SENTRY_AUTH_TOKEN environment variable at build time.
# Never put the actual token here.
